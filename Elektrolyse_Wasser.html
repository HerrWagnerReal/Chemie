      const cos = Math.cos(this.spin);
      const sin = Math.sin(this.spin);
      const nextHx = this.hx * cos - this.hy * sin;
      const nextHy = this.hx * sin + this.hy * cos;

      const oldX = this.x;
      const oldY = this.y;

      const tryX = this.x + this.vx;
      if (this.fitsInWater(tryX, this.y, nextHx, nextHy)) {
        this.x = tryX;
      } else {
        this.x = oldX;
        this.vx *= -0.9;
        registerWallHit(this);
      }

      const tryY = this.y + this.vy;
      if (this.fitsInWater(this.x, tryY, nextHx, nextHy)) {
        this.y = tryY;
      } else {
        this.y = oldY;
        this.vy *= -0.9;
        registerWallHit(this);
      }

      if (this.fitsInWater(this.x, this.y, nextHx, nextHy)) {
        this.hx = nextHx;
        this.hy = nextHy;
      } else {
        this.spin *= -1;
      }

      applyLockedSegmentImpulse(this);
      ensureMinimumVelocity(this, 0.035);
      updateAntiStickState(this);
      return null;
    }

    draw(ctx) {
      this.getAtomPositions().forEach(atom => {
        ctx.beginPath();
        ctx.fillStyle = atom.color;
        ctx.arc(atom.x, atom.y, atom.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 0.5;
        ctx.strokeStyle = 'rgba(40, 55, 75, 0.15)';
        ctx.beginPath();
        ctx.arc(atom.x, atom.y, atom.r, 0, Math.PI * 2);
        ctx.stroke();

        if (atom.charge && !isPointInAnyGasRegion(atom.x, atom.y)) {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
          ctx.lineWidth = 1.8;
          ctx.font = 'bold 10px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.strokeText(atom.charge, atom.x, atom.y + 0.2);
          ctx.fillStyle = 'rgba(50, 70, 180, 1)';
          ctx.fillText(atom.charge, atom.x, atom.y + 0.2);
        }
      });
    }
  }

  function pointInSpawnSafeWater(px, py) {
    if (!pointInWater(px, py, 'water')) return false;

    const spawnMarginY = 18;
    const wallMargin = 10;

    for (const syringe of waterGeometry.syringes) {
      const insideColumn =
        px >= syringe.inner.x + wallMargin &&
        px <= syringe.inner.x + syringe.inner.width - wallMargin &&
        py >= syringe.inner.y + wallMargin &&
        py <= syringe.inner.y + syringe.inner.height - wallMargin;

      if (!insideColumn) continue;

      const retentionLineY = getAtomRetentionLineY(syringe);
      if (Math.abs(py - retentionLineY) < spawnMarginY) return false;

      const boundaryY = getTopLockBoundaryY(syringe);
      if (boundaryY != null && Math.abs(py - boundaryY) < spawnMarginY) return false;
    }

    return true;
  }

  function randomPointInWater(existingPoints = []) {
    const tub = waterGeometry.tub;
    const minSpawnDistance = 14;

    const sampleZones = [
      {
        weight: 0.6,
        rect: {
          x: tub.x + 12,
          y: tub.y + 12,
          width: Math.max(20, tub.width - 24),
          height: Math.max(20, tub.height - 24)
        }
      },
      ...waterGeometry.syringes.map(syringe => ({
        weight: 0.2,
        rect: {
          x: syringe.inner.x + 10,
          y: syringe.inner.y + 14,
          width: Math.max(12, syringe.inner.width - 20),
          height: Math.max(12, syringe.inner.height - 28)
        }
      }))
    ];

    const totalWeight = sampleZones.reduce((sum, zone) => sum + zone.weight, 0);

    for (let i = 0; i < 7000; i++) {
      let pick = Math.random() * totalWeight;
      let zone = sampleZones[0];
      for (const candidate of sampleZones) {
        pick -= candidate.weight;
        if (pick <= 0) {
          zone = candidate;
          break;
        }
      }

      const x = zone.rect.x + Math.random() * zone.rect.width;
      const y = zone.rect.y + Math.random() * zone.rect.height;
      if (!pointInSpawnSafeWater(x, y)) continue;

      const farEnough = existingPoints.every(point => Math.hypot(point.x - x, point.y - y) >= minSpawnDistance);
      if (!farEnough) continue;

      return { x, y };
    }

    for (let i = 0; i < 4000; i++) {
      const x = tub.x + 12 + Math.random() * Math.max(20, tub.width - 24);
      const y = tub.y + 12 + Math.random() * Math.max(20, tub.height - 24);
      if (pointInSpawnSafeWater(x, y)) return { x, y };
    }

    return {
      x: waterGeometry.tub.x + waterGeometry.tub.width / 2,
      y: waterGeometry.tub.y + waterGeometry.tub.height / 2
    };
  }

  function recomputeGasFractionsFromParticles() {
    syringeState.left.trappedH2 = 0;
    syringeState.right.trappedH2 = 0;

    // Gasraum-Logik:
    // - H2 und O2 zählen jeweils als 0.5 Erweiterungsschritt.
    // - H-Atome und O-Atome zählen jeweils als 0.25 Erweiterungsschritt.
    waterGeometry = getWaterGeometry();

    waterGeometry.syringes.forEach(syringe => {
      let gasUnits = 0;

      molecules.forEach(p => {
        if (p.kind === 'hydrogenMolecule' || p.kind === 'oxygenMolecule') {
          if (gasMoleculeInSyringeColumn(p, syringe)) {
            gasUnits += 0.5;
          }
          return;
        }

        if (p.kind !== 'hydrogenAtom' && p.kind !== 'oxygenAtom') return;

        const radius = p.r || p.collisionRadius || 3;
        const insideColumn =
          p.x - radius >= syringe.inner.x &&
          p.x + radius <= syringe.inner.x + syringe.inner.width &&
          p.y - radius >= syringe.outer.y + syringe.closedTop &&
          p.y + radius <= syringe.outer.y + syringe.outer.height;

        if (insideColumn) {
          gasUnits += 0.25;
        }
      });

      syringeState[syringe.key].trappedH2 = gasUnits;
    });

    Object.keys(syringeState).forEach(key => {
      const steps = Math.min(9, Math.floor(syringeState[key].trappedH2 || 0));
      syringeState[key].targetWaterFraction = Math.max(0, 1 - steps / 9);
    });

    waterGeometry = getWaterGeometry();
    updateGasDebugZones();
  }

  function buildMolecules() {
    waterGeometry = getWaterGeometry();
    molecules = [];

    Object.values(syringeState).forEach(s => {
      s.trappedH2 = 0;
      s.waterFraction = 1;
      s.targetWaterFraction = 1;
    });
    updateSyringeVisuals();
    waterGeometry = getWaterGeometry();
    updateGasDebugZones();

    const totalCount = 150;
    const spawnPoints = [];
    for (let i = 0; i < totalCount; i++) {
      const p = randomPointInWater(spawnPoints);
      spawnPoints.push(p);
      molecules.push(new WaterMolecule(p.x, p.y));
    }
  }


  function createWaterFromCenter(x, y, vx, vy) {
    const w = new WaterMolecule(x, y);
    w.vx = vx;
    w.vy = vy;
    w.theta = Math.random() * Math.PI * 2;
    w.omega = (Math.random() - 0.5) * 0.01;
    initAntiStickState(w);
    return w;
  }


  const HYDRATION_MAX_WATERS = 4;
  const HYDRATION_CAPTURE_RADIUS = 38;
  const HYDRATION_RELEASE_RADIUS = 58;
  const HYDRATION_SHELL_RADIUS = 18;
  const HYDRATION_POSITION_EASING = 0.16;
  const HYDRATION_SHELL_TOUCH_RADIUS = HYDRATION_SHELL_RADIUS + 4;
  const HYDRATION_NEUTRALIZATION_MARGIN = 8;
  const HYDRATION_NEUTRALIZATION_PULL = 0.052;
  const HYDRATION_NEUTRALIZATION_MAX_SPEED = 0.34;
  const HYDRATION_NEUTRALIZATION_REACTION_DISTANCE = 18;

  function isIonNeutralizing(particle) {
    return Boolean(particle && particle.neutralizationActive && particle.neutralizationPartner);
  }

  function isHydratableIon(particle) {
    return particle &&
      !isIonNeutralizing(particle) &&
      (particle.kind === 'hydroxide' || particle.kind === 'oxoniumIon');
  }

  function getIonChargeCenter(ion) {
    if (!ion) return null;
    // Beim Hydroxid sitzt die negative Ladung am Sauerstoff; beim Oxonium sitzt
    // die positive Ladung ebenfalls am zentralen Sauerstoff.
    return { x: ion.x, y: ion.y };
  }

  function clearHydrationState(water) {
    if (!water || water.kind !== 'water') return;
    water.hydrationPartner = null;
    water.hydrationSlot = -1;
    water.hydrationStrength = 0;
  }

  function shouldSkipHydratedPairCollision(a, b) {
    return (
      (a.kind === 'water' && a.hydrationPartner === b && isHydratableIon(b)) ||
      (b.kind === 'water' && b.hydrationPartner === a && isHydratableIon(a))
    );
  }

  function getHydrationSlotAngle(ion, slotIndex) {
    const base = ion.kind === 'hydroxide' ? Math.PI / 4 : 0;
    return base + slotIndex * (Math.PI * 2 / HYDRATION_MAX_WATERS);
  }

  function getDesiredHydrationTheta(waterX, waterY, ion) {
    const center = getIonChargeCenter(ion);
    const directionToIon = Math.atan2(center.y - waterY, center.x - waterX);
    return ion.kind === 'hydroxide'
      ? directionToIon
      : directionToIon + Math.PI;
  }

  function hydrationTargetForSlot(water, ion, slotIndex) {
    const center = getIonChargeCenter(ion);
    if (!center) return null;

    const angle = getHydrationSlotAngle(ion, slotIndex);
    const x = center.x + Math.cos(angle) * HYDRATION_SHELL_RADIUS;
    const y = center.y + Math.sin(angle) * HYDRATION_SHELL_RADIUS;
    const theta = getDesiredHydrationTheta(x, y, ion);

    return { x, y, theta };
  }

  function isHydrationTargetAllowed(water, ion, slotIndex) {
    const target = hydrationTargetForSlot(water, ion, slotIndex);
    if (!target) return false;

    // Wichtig: Nicht nur der Mittelpunkt, sondern alle Atome des Wassermoleküls
    // müssen im erlaubten Wasserbereich liegen. Sonst zieht die Hydrathülle
    // Moleküle durch Glaswände, Gasräume oder aus der Wanne heraus.
    return water.fitsInWater(target.x, target.y, target.theta);
  }

  function findFreeValidHydrationSlot(water, ion, usedSlots) {
    for (let slot = 0; slot < HYDRATION_MAX_WATERS; slot += 1) {
      if (usedSlots.has(slot)) continue;
      if (isHydrationTargetAllowed(water, ion, slot)) return slot;
    }
    return -1;
  }

  function canWaterJoinHydrationShell(water) {
    if (!water || water.kind !== 'water') return false;
    if (water.reactionState && water.reactionState !== 'idle') return false;
    if (!water.fitsInWater(water.x, water.y, water.theta)) return false;
    return true;
  }

  function updateHydratedWaterPose(water, ion, slotIndex) {
    const center = getIonChargeCenter(ion);
    if (!center) return;

    const target = hydrationTargetForSlot(water, ion, slotIndex);
    if (!target || !isHydrationTargetAllowed(water, ion, slotIndex)) {
      clearHydrationState(water);
      return;
    }

    const oldX = water.x;
    const oldY = water.y;
    const oldTheta = water.theta;

    const dx = target.x - water.x;
    const dy = target.y - water.y;
    const nextX = water.x + dx * HYDRATION_POSITION_EASING;
    const nextY = water.y + dy * HYDRATION_POSITION_EASING;

    let deltaTheta = target.theta - water.theta;
    while (deltaTheta > Math.PI) deltaTheta -= Math.PI * 2;
    while (deltaTheta < -Math.PI) deltaTheta += Math.PI * 2;
    const nextTheta = water.theta + deltaTheta * 0.18;

    if (!water.fitsInWater(nextX, nextY, nextTheta)) {
      water.x = oldX;
      water.y = oldY;
      water.theta = oldTheta;
      clearHydrationState(water);
      return;
    }

    water.x = nextX;
    water.y = nextY;
    water.theta = nextTheta;
    water.vx = water.vx * 0.78 + dx * 0.012;
    water.vy = water.vy * 0.78 + dy * 0.012;
    water.vx = clamp(water.vx, -0.24, 0.24);
    water.vy = clamp(water.vy, -0.24, 0.24);
    water.omega *= 0.45;
    water.hydrationStrength = Math.min(1, (water.hydrationStrength || 0) + 0.06);
  }

  function updateHydrationShells() {
    if (!molecules || molecules.length === 0) return;

    const moleculeSet = new Set(molecules);
    molecules.forEach(p => {
      if (p.kind !== 'water') return;
      if (!p.hydrationPartner || !moleculeSet.has(p.hydrationPartner)) {
        clearHydrationState(p);
        return;
      }
      const center = getIonChargeCenter(p.hydrationPartner);
      if (!center || Math.hypot(p.x - center.x, p.y - center.y) > HYDRATION_RELEASE_RADIUS) {
        clearHydrationState(p);
      }
    });

    const waters = molecules.filter(p => p.kind === 'water');
    const ions = molecules.filter(isHydratableIon);

    ions.forEach(ion => {
      let shell = waters
        .filter(w => w.hydrationPartner === ion)
        .sort((a, b) => a.hydrationSlot - b.hydrationSlot)
        .slice(0, HYDRATION_MAX_WATERS);

      const usedSlots = new Set();
      shell.forEach(w => {
        if (
          w.hydrationSlot < 0 ||
          w.hydrationSlot >= HYDRATION_MAX_WATERS ||
          usedSlots.has(w.hydrationSlot) ||
          !isHydrationTargetAllowed(w, ion, w.hydrationSlot)
        ) {
          const slot = findFreeValidHydrationSlot(w, ion, usedSlots);
          if (slot < 0) {
            clearHydrationState(w);
            return;
          }
          w.hydrationSlot = slot;
        }
        usedSlots.add(w.hydrationSlot);
      });
      shell = shell.filter(w => w.hydrationPartner === ion);

      while (shell.length < HYDRATION_MAX_WATERS) {
        const center = getIonChargeCenter(ion);
        const candidate = waters
          .filter(w => !w.hydrationPartner && canWaterJoinHydrationShell(w))
          .map(w => ({ w, d: Math.hypot(w.x - center.x, w.y - center.y) }))
          .filter(item => item.d <= HYDRATION_CAPTURE_RADIUS)
          .sort((a, b) => a.d - b.d)[0];

        if (!candidate) break;

        const slot = findFreeValidHydrationSlot(candidate.w, ion, usedSlots);
        if (slot < 0) break;

        candidate.w.hydrationPartner = ion;
        candidate.w.hydrationSlot = slot;
        candidate.w.hydrationStrength = 0;
        usedSlots.add(slot);
        shell.push(candidate.w);
      }

      shell.forEach(w => {
        if (!canWaterJoinHydrationShell(w)) {
          clearHydrationState(w);
          return;
        }
        updateHydratedWaterPose(w, ion, w.hydrationSlot);
      });
    });
  }

  function drawHydrationShells() {
    if (!molecules || molecules.length === 0) return;

    ctx.save();
    ctx.lineWidth = 1.1;
    ctx.setLineDash([3, 4]);
    ctx.strokeStyle = 'rgba(70, 120, 190, 0.28)';
    ctx.fillStyle = 'rgba(70, 120, 190, 0.04)';

    molecules.filter(isHydratableIon).forEach(ion => {
      const shellWaters = molecules.filter(w => w.kind === 'water' && w.hydrationPartner === ion);
      if (shellWaters.length === 0) return;
      const center = getIonChargeCenter(ion);
      ctx.beginPath();
      ctx.arc(center.x, center.y, HYDRATION_SHELL_TOUCH_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.setLineDash([2, 5]);
      shellWaters.forEach(water => {
        const alpha = 0.12 + 0.22 * (water.hydrationStrength || 0);
        ctx.strokeStyle = `rgba(50, 100, 180, ${alpha})`;
        ctx.beginPath();
        ctx.moveTo(center.x, center.y);
        ctx.lineTo(water.x, water.y);
        ctx.stroke();
      });
      ctx.setLineDash([3, 4]);
      ctx.strokeStyle = 'rgba(70, 120, 190, 0.28)';
    });

    ctx.restore();
  }

  function getHydrationShellWaterCount(ion) {
    if (!ion || !molecules) return 0;
    return molecules.filter(w => w.kind === 'water' && w.hydrationPartner === ion).length;
  }

  function hydrationShellsOverlapBeforeRelease(ionA, ionB) {
    const centerA = getIonChargeCenter(ionA);
    const centerB = getIonChargeCenter(ionB);
    if (!centerA || !centerB) return false;

    const hasShellA = getHydrationShellWaterCount(ionA) > 0;
    const hasShellB = getHydrationShellWaterCount(ionB) > 0;
    if (!hasShellA || !hasShellB) return false;

    const dist = Math.hypot(centerB.x - centerA.x, centerB.y - centerA.y);
    return dist <= HYDRATION_SHELL_TOUCH_RADIUS * 2;
  }

  function releaseHydrationShellForIon(ion) {
    if (!ion || !molecules) return;
    molecules.forEach(water => {
      if (water.kind !== 'water' || water.hydrationPartner !== ion) return;
      clearHydrationState(water);
      water.vx += (Math.random() - 0.5) * 0.12;
      water.vy += (Math.random() - 0.5) * 0.12;
      water.omega = (Math.random() - 0.5) * 0.018;
    });
  }

  function startHydrationShellNeutralization(oxonium, hydroxide) {
    releaseHydrationShellForIon(oxonium);
    releaseHydrationShellForIon(hydroxide);

    oxonium.neutralizationPartner = hydroxide;
    hydroxide.neutralizationPartner = oxonium;
    oxonium.neutralizationActive = true;
    hydroxide.neutralizationActive = true;

    const dx = hydroxide.x - oxonium.x;
    const dy = hydroxide.y - oxonium.y;
    const dist = Math.max(0.0001, Math.hypot(dx, dy));
    const nx = dx / dist;
    const ny = dy / dist;

    oxonium.vx = nx * HYDRATION_NEUTRALIZATION_MAX_SPEED * 0.65;
    oxonium.vy = ny * HYDRATION_NEUTRALIZATION_MAX_SPEED * 0.65;
    hydroxide.vx = -nx * HYDRATION_NEUTRALIZATION_MAX_SPEED * 0.65;
    hydroxide.vy = -ny * HYDRATION_NEUTRALIZATION_MAX_SPEED * 0.65;
  }

  function nudgeIonToward(ion, target, strength = HYDRATION_NEUTRALIZATION_PULL) {
    if (!ion || !target) return;
    const dx = target.x - ion.x;
    const dy = target.y - ion.y;
    const dist = Math.max(0.0001, Math.hypot(dx, dy));
    const nx = dx / dist;
    const ny = dy / dist;

    const nextVx = clamp((ion.vx || 0) * 0.82 + nx * strength, -HYDRATION_NEUTRALIZATION_MAX_SPEED, HYDRATION_NEUTRALIZATION_MAX_SPEED);
    const nextVy = clamp((ion.vy || 0) * 0.82 + ny * strength, -HYDRATION_NEUTRALIZATION_MAX_SPEED, HYDRATION_NEUTRALIZATION_MAX_SPEED);

    const testX = ion.x + nextVx;
    const testY = ion.y + nextVy;
    if (particleFitsAt(ion, testX, testY)) {
      ion.vx = nextVx;
      ion.vy = nextVy;
      ion.x = testX;
      ion.y = testY;
    } else {
      ion.vx = (Math.random() - 0.5) * 0.08;
      ion.vy = (Math.random() - 0.5) * 0.08;
    }
  }

  function createNeutralizationWaters(oxonium, hydroxide) {
    const mx = (oxonium.x + hydroxide.x) / 2;
    const my = (oxonium.y + hydroxide.y) / 2;
    const mvx = ((oxonium.vx || 0) + (hydroxide.vx || 0)) * 0.25;
    const mvy = ((oxonium.vy || 0) + (hydroxide.vy || 0)) * 0.25;
    const dx = hydroxide.x - oxonium.x;
    const dy = hydroxide.y - oxonium.y;
    const dist = Math.max(0.0001, Math.hypot(dx, dy));
    const nx = dx / dist;
    const ny = dy / dist;

    const offsets = [4.6, 9.8, 14.0];
    for (const offset of offsets) {
      const waterA = createWaterFromCenter(mx - nx * offset, my - ny * offset, mvx - ny * 0.045, mvy + nx * 0.045);
      const waterB = createWaterFromCenter(mx + nx * offset, my + ny * offset, mvx + ny * 0.045, mvy - nx * 0.045);
      if (particleFitsAt(waterA) && particleFitsAt(waterB) &&
          !wouldCollideAt(waterA, waterA.x, waterA.y, -2.5) &&
          !wouldCollideAt(waterB, waterB.x, waterB.y, -2.5)) {
        return [waterA, waterB];
      }
    }

    const waterA = createWaterFromCenter(mx - nx * 5.5, my - ny * 5.5, mvx - ny * 0.045, mvy + nx * 0.045);
    const waterB = createWaterFromCenter(mx + nx * 5.5, my + ny * 5.5, mvx + ny * 0.045, mvy - nx * 0.045);
    return [waterA, waterB];
  }

  function neutralizeHydrationShellTouchingIons() {
    if (!molecules || molecules.length === 0) return;

    const moleculeSet = new Set(molecules);
    molecules.forEach(p => {
      if ((p.kind === 'oxoniumIon' || p.kind === 'hydroxide') && p.neutralizationActive) {
        if (!p.neutralizationPartner || !moleculeSet.has(p.neutralizationPartner)) {
          p.neutralizationPartner = null;
          p.neutralizationActive = false;
        }
      }
    });

    const oxoniumIons = molecules.filter(p => p.kind === 'oxoniumIon');
    const hydroxideIons = molecules.filter(p => p.kind === 'hydroxide');

    for (const oxonium of oxoniumIons) {
      if (oxonium.neutralizationActive) continue;
      for (const hydroxide of hydroxideIons) {
        if (hydroxide.neutralizationActive) continue;
        if (!hydrationShellsOverlapBeforeRelease(oxonium, hydroxide)) continue;
        startHydrationShellNeutralization(oxonium, hydroxide);
        break;
      }
    }

    const removedParticles = new Set();
    const createdParticles = [];

    for (const oxonium of oxoniumIons) {
      if (removedParticles.has(oxonium) || !oxonium.neutralizationActive) continue;
      const hydroxide = oxonium.neutralizationPartner;
      if (!hydroxide || removedParticles.has(hydroxide) || !moleculeSet.has(hydroxide)) continue;

      releaseHydrationShellForIon(oxonium);
      releaseHydrationShellForIon(hydroxide);
      nudgeIonToward(oxonium, hydroxide);
      nudgeIonToward(hydroxide, oxonium);

      const dist = Math.hypot(hydroxide.x - oxonium.x, hydroxide.y - oxonium.y);
      const directContactDistance = Math.max(
        HYDRATION_NEUTRALIZATION_REACTION_DISTANCE,
        (oxonium.collisionRadius || 0) + (hydroxide.collisionRadius || 0) - 1
      );

      if (dist <= directContactDistance) {
        const products = createNeutralizationWaters(oxonium, hydroxide);
        if (products.every(product => particleFitsAt(product))) {
          removedParticles.add(oxonium);
          removedParticles.add(hydroxide);
          createdParticles.push(...products);
        }
      }
    }

    if (removedParticles.size > 0 || createdParticles.length > 0) {
      molecules.forEach(water => {
        if (water.kind === 'water' && removedParticles.has(water.hydrationPartner)) {
          clearHydrationState(water);
        }
      });
      molecules = molecules.filter(p => !removedParticles.has(p));
      molecules.push(...createdParticles);
    }
  }


  function particleFitsAt(particle, x = particle.x, y = particle.y) {
    if (!particle || typeof particle.fitsInWater !== 'function') return true;
    // Freie Einzelatome entstehen nur durch Elektrodenreaktionen. Deshalb dürfen sie
    // nicht im Wasserbad außerhalb der Spritzen stabilisiert werden.
    if (particle.kind === 'hydrogenAtom' || particle.kind === 'oxygenAtom') {
      return particle.fitsInWater(x, y) && particleFullyInsideAnySyringeWater(particle, x, y);
    }
    if (particle.kind === 'water') return particle.fitsInWater(x, y, particle.theta);
    if (particle.kind === 'oxoniumIon') return particle.fitsInWater(x, y, particle.theta);
    if (particle.kind === 'hydroxide') return particle.fitsInWater(x, y, particle.hx, particle.hy);
    if (particle.kind === 'oxygenMolecule' || particle.kind === 'hydrogenMolecule') return particle.fitsInWater(x, y, particle.theta);
    return particle.fitsInWater(x, y);
  }

  function wouldCollideAt(particle, x, y, margin = 1.2) {
    const r = particle.collisionRadius || particle.r || 4;
    return molecules.some(other => {
      if (!other || other === particle) return false;
      if (shouldSkipHydratedPairCollision(particle, other)) return false;
      const otherRadius = other.collisionRadius || other.r || 4;
      return Math.hypot(other.x - x, other.y - y) < r + otherRadius + margin;
    });
  }


  function particlesShareSameSyringeWaterArea(a, b) {
    if (!waterGeometry || !waterGeometry.syringes) return false;
    return waterGeometry.syringes.some(syringe =>
      particleFullyInsideSyringeWater(a, syringe) && particleFullyInsideSyringeWater(b, syringe)
    );
  }

  function findNearestAllowedNonCollidingPoint(particle) {
    const starts = [];
    if (Number.isFinite(particle.x) && Number.isFinite(particle.y)) starts.push({ x: particle.x, y: particle.y });
    if (Number.isFinite(particle.prevX) && Number.isFinite(particle.prevY)) starts.push({ x: particle.prevX, y: particle.prevY });
    if ((particle.kind === 'hydrogenAtom' || particle.kind === 'oxygenAtom') && waterGeometry?.syringes) {
      waterGeometry.syringes.forEach(s => {
        starts.push({ x: s.inner.x + s.inner.width / 2, y: s.inner.y + s.inner.height / 2 });
      });
    }

    let bestAllowed = null;
    let bestAllowedDistance = Infinity;
    const maxSearchRadius = (particle.kind === 'hydrogenAtom' || particle.kind === 'oxygenAtom') ? 260 : 90;

    for (const start of starts) {
      for (let radius = 0; radius <= maxSearchRadius; radius += 3) {
        const samples = radius === 0 ? 1 : Math.max(12, Math.ceil(radius * 1.4));
        for (let i = 0; i < samples; i += 1) {
          const angle = radius === 0 ? 0 : (Math.PI * 2 * i) / samples;
          const x = start.x + Math.cos(angle) * radius;
          const y = start.y + Math.sin(angle) * radius;
          if (!particleFitsAt(particle, x, y)) continue;

          const d = Math.hypot(x - particle.x, y - particle.y);
          if (d < bestAllowedDistance) {
            bestAllowed = { x, y };
            bestAllowedDistance = d;
          }

          if (!wouldCollideAt(particle, x, y)) return { x, y };
        }
      }
    }

    return bestAllowed;
  }

  function pullAtomBackIntoAllowedArea(atom) {
    const target = findNearestAllowedNonCollidingPoint(atom);
    if (!target) return false;

    atom.x = target.x;
    atom.y = target.y;

    // Nach der Korrektur bekommt das Atom einen kleinen Impuls in den erlaubten Bereich.
    // Dadurch bleibt es beweglich und kann wieder sicher mit passenden Teilchen kollidieren.
    const angle = Math.atan2(target.y - (atom.prevY ?? target.y), target.x - (atom.prevX ?? target.x));
    atom.vx = clamp((atom.vx || 0) * 0.35 + Math.cos(angle) * 0.08, -0.28, 0.28);
    atom.vy = clamp((atom.vy || 0) * 0.35 + Math.sin(angle) * 0.08, -0.28, 0.28);
    initAntiStickState(atom);
    return true;
  }

  function repairParticlesOutsideAllowedArea() {
    if (!waterGeometry || !molecules) return;

    molecules.forEach(particle => {
      if (!particle || typeof particle.fitsInWater !== 'function') return;
      if (particleFitsAt(particle)) return;

      if (particle.kind === 'water') clearHydrationState(particle);

      // Einzelne H- und O-Atome werden zum nächstliegenden erlaubten Punkt gezogen.
      // Dabei wird ein Punkt bevorzugt, an dem keine Überlappung mit anderen Teilchen entsteht.
      if (particle.kind === 'hydrogenAtom' || particle.kind === 'oxygenAtom') {
        if (pullAtomBackIntoAllowedArea(particle)) return;
      }

      // Für alle anderen Teilchen bleibt die konservative Rücksetzlogik erhalten.
      const fallbackX = typeof particle.prevX === 'number' ? particle.prevX : particle.x;
      const fallbackY = typeof particle.prevY === 'number' ? particle.prevY : particle.y;

      if (particleFitsAt(particle, fallbackX, fallbackY) && !wouldCollideAt(particle, fallbackX, fallbackY, 0.5)) {
        particle.x = fallbackX;
        particle.y = fallbackY;
        particle.vx *= -0.55;
        particle.vy *= -0.55;
        return;
      }

      const safePoint = findNearestAllowedNonCollidingPoint(particle);
      if (safePoint) {
        particle.x = safePoint.x;
        particle.y = safePoint.y;
        particle.vx *= -0.35;
        particle.vy *= -0.35;
        initAntiStickState(particle);
      }
    });
  }

  function resolveParticleCollisions() {
    const newParticles = [];
    const removed = new Set();

    for (let i = 0; i < molecules.length; i++) {
      if (removed.has(i)) continue;

      for (let j = i + 1; j < molecules.length; j++) {
        if (removed.has(j)) continue;

        const a = molecules[i];
        const b = molecules[j];

        if (shouldSkipHydratedPairCollision(a, b)) continue;

        if (
          (a.kind === 'oxoniumIon' && b.kind === 'hydroxide') ||
          (b.kind === 'oxoniumIon' && a.kind === 'hydroxide')
        ) {
          const dxr = b.x - a.x;
          const dyr = b.y - a.y;
          const distr = Math.hypot(dxr, dyr);
          if (distr < a.collisionRadius + b.collisionRadius) {
            const oxonium = a.kind === 'oxoniumIon' ? a : b;
            const hydroxide = a.kind === 'hydroxide' ? a : b;
            releaseHydrationShellForIon(oxonium);
            releaseHydrationShellForIon(hydroxide);
            const products = createNeutralizationWaters(oxonium, hydroxide);
            if (products.every(product => particleFitsAt(product))) {
              newParticles.push(...products);
              removed.add(i);
              removed.add(j);
              break;
            }
          }
        }

        if (
          (a.kind === 'hydrogenCation' && b.kind === 'hydroxide') ||
          (b.kind === 'hydrogenCation' && a.kind === 'hydroxide')
        ) {
          const dxr = b.x - a.x;
          const dyr = b.y - a.y;
          const distr = Math.hypot(dxr, dyr);
          if (distr < a.collisionRadius + b.collisionRadius) {
            const mx = (a.x + b.x) / 2;
            const my = (a.y + b.y) / 2;
            const mvx = (a.vx + b.vx) * 0.5;
            const mvy = (a.vy + b.vy) * 0.5;
            newParticles.push(
              createWaterFromCenter(mx, my, mvx, mvy)
            );
            removed.add(i);
            removed.add(j);
            break;
          }
        }

        if (
          (a.kind === 'hydrogenCation' && b.kind === 'water') ||
          (b.kind === 'hydrogenCation' && a.kind === 'water')
        ) {
          const cation = a.kind === 'hydrogenCation' ? a : b;
          const water = a.kind === 'water' ? a : b;

          const dxc = b.x - a.x;
          const dyc = b.y - a.y;
          const distc = Math.hypot(dxc, dyc);

          if (distc < a.collisionRadius + b.collisionRadius) {
            const theta = Math.atan2(cation.y - water.y, cation.x - water.x);
            const mvx = (a.vx + b.vx) * 0.5;
            const mvy = (a.vy + b.vy) * 0.5;
            newParticles.push(new OxoniumIon(water.x, water.y, theta, mvx, mvy));
            removed.add(i);
            removed.add(j);
            break;
          }
        }

        if (a.kind === 'hydrogenAtom' && b.kind === 'hydrogenAtom') {
          const dxh = b.x - a.x;
          const dyh = b.y - a.y;
          const disth = Math.hypot(dxh, dyh);
          if (disth < a.collisionRadius + b.collisionRadius && particlesShareSameSyringeWaterArea(a, b)) {
            const mx = (a.x + b.x) / 2;
            const my = (a.y + b.y) / 2;
            const mvx = (a.vx + b.vx) * 0.5;
            const mvy = (a.vy + b.vy) * 0.5;
            const product = new HydrogenMolecule(mx, my, mvx, mvy);
            if (particleFullyInsideAnySyringeWater(product)) {
              newParticles.push(product);
              removed.add(i);
              removed.add(j);
              break;
            }
          }
        }

        if (a.kind === 'oxygenAtom' && b.kind === 'oxygenAtom') {
          const dxo = b.x - a.x;
          const dyo = b.y - a.y;
          const disto = Math.hypot(dxo, dyo);
          if (disto < a.collisionRadius + b.collisionRadius && particlesShareSameSyringeWaterArea(a, b)) {
            const mx = (a.x + b.x) / 2;
            const my = (a.y + b.y) / 2;
            const mvx = (a.vx + b.vx) * 0.5;
            const mvy = (a.vy + b.vy) * 0.5;
            const product = new OxygenMolecule(mx, my, mvx, mvy);
            if (particleFullyInsideAnySyringeWater(product)) {
              newParticles.push(product);
              removed.add(i);
              removed.add(j);
              break;
            }
          }
        }

        let dx = b.x - a.x;
        let dy = b.y - a.y;
        let dist = Math.hypot(dx, dy);
        if (dist === 0) dist = 0.0001;

        const minDist = a.collisionRadius + b.collisionRadius;
        if (dist < minDist) {
          const nx = dx / dist;
          const ny = dy / dist;
          const overlap = minDist - dist;

          a.x -= nx * overlap * 0.5;
          a.y -= ny * overlap * 0.5;
          b.x += nx * overlap * 0.5;
          b.y += ny * overlap * 0.5;

          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const velAlongNormal = rvx * nx + rvy * ny;

          if (velAlongNormal < 0) {
            const impulse = velAlongNormal;
            a.vx += impulse * nx;
            a.vy += impulse * ny;
            b.vx -= impulse * nx;
            b.vy -= impulse * ny;
          }
        }
      }
    }

    const remaining = molecules.filter((_, idx) => !removed.has(idx));
    molecules.length = 0;
    molecules.push(...remaining, ...newParticles);
  }

  function stepParticles() {
    const nextParticles = [];
    molecules.forEach(particle => {
      const reactionProducts = particle.update();
      if (reactionProducts && particle.kind === 'water') {
        const validProducts = reactionProducts.filter(product => {
          if (product.kind === 'hydrogenAtom' || product.kind === 'oxygenAtom') {
            return particleFullyInsideAnySyringeWater(product);
          }
          return particleFitsAt(product);
        });
        if (validProducts.length === reactionProducts.length) {
          nextParticles.push(...validProducts);
        } else {
          // Falls ein Produkt außerhalb der Spritze läge, bleibt das Wassermolekül erhalten.
          particle.resetReactionState?.();
          nextParticles.push(particle);
        }
      } else {
        nextParticles.push(particle);
      }
    });
    molecules = nextParticles;
  }

  function drawMolecules(timestamp = performance.now()) {
    ctx.clearRect(0, 0, moleculeCanvas.width, moleculeCanvas.height);

    if (lastFrameTimestamp == null) lastFrameTimestamp = timestamp;
    const realDt = Math.max(0, Math.min(100, timestamp - lastFrameTimestamp));
    lastFrameTimestamp = timestamp;

    if (!simulationPaused) {
      simulatedNowMs += realDt * simulationSpeed;
      simulationStepAccumulator += (realDt / 16.6667) * simulationSpeed;
      const steps = Math.min(4, Math.floor(simulationStepAccumulator));
      if (steps > 0) simulationStepAccumulator = Math.max(0, simulationStepAccumulator - steps);

      for (let step = 0; step < steps; step += 1) {
        stepParticles();
        recomputeGasFractionsFromParticles();
        updateSyringeWaterLevelsSmoothly();
        waterGeometry = getWaterGeometry();
        updateGasDebugZones();
        updateElectrodeElectronAnimations();
        updateElectronTransfers();
        updateWaterReactionElectronTransfers();
        releaseStaleAnodeLocks();
        resolveParticleCollisions();
        repairParticlesOutsideAllowedArea();
        updateHydrationShells();
        neutralizeHydrationShellTouchingIons();
        repairParticlesOutsideAllowedArea();
      }
    }

    drawHydrationShells();
    molecules.forEach(m => m.draw(ctx));
    requestAnimationFrame(drawMolecules);
  }

  window.addEventListener('resize', () => {
    buildMolecules();
    updateAll();
    updateGasDebugZones();
  });

  applyViewCamera();
  updateSyringeVisuals();
  buildMolecules();
  updateAll();
  refreshAllElectrodeElectronSlots();
  updateGasDebugZones();
  drawMolecules();
</script>
</body>
</html>
