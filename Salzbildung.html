function renderElectron(cls){const e=document.createElement('div');e.className=`electron ${cls}`;return e}
function atomChargeLabel(atom){return state.reacted ? 'Ion' : 'Atom'}
function electronCount(atom){return atom.counts.reduce((sum,value)=>sum+value,0)}
function atomStatsText(atom){return `Protonen: ${atom.el.atomicNumber} · Elektronen: ${electronCount(atom)}`}
function updateAtomStats(atom){if(atom.card){const stats=atom.card.querySelector('.atom-stats');if(stats)stats.textContent=atomStatsText(atom)}}
function expectedIonCharge(atom){return atom.el.atomicNumber-electronCount(atom)}
function normalizeChargeInput(value){return String(value).trim().replace(/\s+/g,'').replace('−','-')}
function parseChargeInput(value){
let v=normalizeChargeInput(value);
if(!v)return null;
if(v==='+')return 1;
if(v==='-')return -1;
// chemical notation: number first, then sign, e.g. 2+ or 3-
let m=v.match(/^(\d+)([+-])$/);
if(!m)return null;
let n=parseInt(m[1],10);
if(n<=1)return null;
let sign=m[2];
return sign==='-'?-n:n
}
function formatCharge(value){if(value===0)return '0';const n=Math.abs(value);const sign=value>0?'+':'−';return n===1?sign:`${n}${sign}`}
function checkIonAnswer(atom,input,feedback){const expected=expectedIonCharge(atom);const got=parseChargeInput(input.value);if(got===null){feedback.textContent='';feedback.className='ion-feedback';return}if(got===expected){feedback.textContent='richtig';feedback.className='ion-feedback ok'}else{feedback.textContent='prüfen';feedback.className='ion-feedback bad'}}
function showIonQuestions(){[...state.metalAtoms,...state.nonmetalAtoms].forEach(atom=>{if(!atom.card)return;const q=atom.card.querySelector('.ion-question');if(q){q.classList.add('visible');const input=q.querySelector('.ion-input');const feedback=q.querySelector('.ion-feedback');checkIonAnswer(atom,input,feedback)}})}
function createAtom(el, id, side){return {id,el,side,counts:distributeElectrons(el.atomicNumber),charge:0,card:null,orbitals:[]}}
function renderAtom(atom){const card=document.createElement('div');card.className='atom-card';card.dataset.atomId=atom.id;const label=document.createElement('div');label.className='atom-label';label.innerHTML=`<div><span class="symbol">${atom.el.symbol}</span> <span>${atom.el.name}</span></div><span class="charge ${state.reacted?'changed':''}">${atomChargeLabel(atom)}</span>`;const diagram=document.createElement('div');diagram.className='diagram';diagram.innerHTML=`<img class="template-bg" src="${SVG_SRC}" alt="Energiestufenmodell">`;atom.orbitals=[];orbitalLayout.forEach((item,i)=>{const o=document.createElement('div');o.className='orbital';o.dataset.index=i;o.style.left=item.left+'%';o.style.top=item.top+'%';o.style.width=item.width+'%';o.style.height=item.height+'%';electronSlotsForOrbital(atom.counts[i]).forEach(cls=>o.appendChild(renderElectron(cls)));diagram.appendChild(o);atom.orbitals.push(o)});const stats=document.createElement('div');stats.className='atom-stats';stats.textContent=atomStatsText(atom);const ionQuestion=document.createElement('div');ionQuestion.className='ion-question'+(state.reacted?' visible':'');const ionLabel=document.createElement('label');ionLabel.textContent='Ladung des Ions:';const ionInput=document.createElement('input');ionInput.className='ion-input';ionInput.type='text';ionInput.placeholder='z. B. + oder 2+';const ionFeedback=document.createElement('span');ionFeedback.className='ion-feedback';ionInput.addEventListener('input',()=>checkIonAnswer(atom,ionInput,ionFeedback));ionQuestion.append(ionLabel,ionInput,ionFeedback);card.append(label,diagram,stats,ionQuestion);atom.card=card;return card}
function buildModels(){state.reacted=false;state.animating=false;const m=elements[metalSelect.value], n=elements[nonmetalSelect.value];const total=lcm(m.give,n.take), mCount=total/m.give, nCount=total/n.take;state.metalAtoms=[];state.nonmetalAtoms=[];metalAtoms.innerHTML='';nonmetalAtoms.innerHTML='';for(let i=0;i<mCount;i++){const a=createAtom(m,`M${i}`,'metal');state.metalAtoms.push(a);metalAtoms.appendChild(renderAtom(a))}for(let i=0;i<nCount;i++){const a=createAtom(n,`N${i}`,'nonmetal');state.nonmetalAtoms.push(a);nonmetalAtoms.appendChild(renderAtom(a))}updateTexts();setStatus('Atommodelle gebildet')}
function updateTexts(){const m=elements[metalSelect.value], n=elements[nonmetalSelect.value];const total=lcm(m.give,n.take), mCount=total/m.give, nCount=total/n.take;metalCountEl.textContent=`${mCount} × ${m.symbol}`;nonmetalCountEl.textContent=`${nCount} × ${n.symbol}`;equationEl.textContent=`${mCount>1?mCount:''}${m.symbol} + ${nCount>1?nCount:''}${n.symbol} → ${compoundFormula(m,n,mCount,nCount)}`;hintEl.textContent=`Elektronenübergänge: ${total} · ${m.symbol} gibt ${m.give} e⁻ ab, ${n.symbol} nimmt ${n.take} e⁻ auf.`}
function compoundFormula(m,n,mc,nc){const sub=x=>x>1?toSub(x):'';return `${m.symbol}${sub(mc)}${n.symbol}${sub(nc)}`} function toSub(num){return String(num).replace(/[0-9]/g,d=>'₀₁₂₃₄₅₆₇₈₉'[d])}
function findElectronInValence(atom){const idxs=[...levelIndices[levelFor(atom.el)]].reverse();for(const i of idxs){if(atom.counts[i]>0)return i}return -1}
function findFreeValenceSlot(atom){const idxs=levelIndices[levelFor(atom.el)];for(const i of idxs){if(atom.counts[i]<2)return i}return -1}
function electronSize(orbital){const r=orbital.getBoundingClientRect();return Math.max(8,Math.min(r.width,r.height)*0.32)}function electronPosition(orbital,countBefore,mode){const r=orbital.getBoundingClientRect();let x=r.left+r.width/2, y=r.top+r.height/2;if(mode==='source'){if(countBefore===2)x=r.left+r.width*.70;else x=r.left+r.width*.5}else{if(countBefore===0)x=r.left+r.width*.5;else x=r.left+r.width*.70}return {x,y,size:electronSize(orbital)}}
function refreshAll(){metalAtoms.innerHTML='';nonmetalAtoms.innerHTML='';state.metalAtoms.forEach(a=>metalAtoms.appendChild(renderAtom(a)));state.nonmetalAtoms.forEach(a=>nonmetalAtoms.appendChild(renderAtom(a)))}
function makeTransfers(){const transfers=[],acceptors=[];state.nonmetalAtoms.forEach(atom=>{for(let k=0;k<atom.el.take;k++)acceptors.push(atom)});let ai=0;state.metalAtoms.forEach(mAtom=>{for(let k=0;k<mAtom.el.give;k++){transfers.push({from:mAtom,to:acceptors[ai++]})}});return transfers}
async function startReaction(){if(state.animating)return;if(state.reacted)buildModels();state.animating=true;setStatus('Reaktion läuft …');const transfers=makeTransfers();for(const t of transfers){await animateOne(t)}state.metalAtoms.forEach(a=>a.charge=a.el.give);state.nonmetalAtoms.forEach(a=>a.charge=-a.el.take);state.reacted=true;state.animating=false;refreshAll();showIonQuestions();setStatus('Reaktion abgeschlossen: Ionen entstanden')}
function createArrowPath(start,end){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','transfer-svg');
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const marker=document.createElementNS('http://www.w3.org/2000/svg','marker');
  const markerId='arrowHead'+Math.random().toString(36).slice(2);
  marker.setAttribute('id',markerId);marker.setAttribute('viewBox','0 0 10 10');marker.setAttribute('refX','8.5');marker.setAttribute('refY','5');marker.setAttribute('markerWidth','7');marker.setAttribute('markerHeight','7');marker.setAttribute('orient','auto-start-reverse');
  const head=document.createElementNS('http://www.w3.org/2000/svg','path');
  head.setAttribute('d','M 0 0 L 10 5 L 0 10 z');head.setAttribute('fill','#3454d1');
  marker.appendChild(head);defs.appendChild(marker);svg.appendChild(defs);
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  const dx=end.x-start.x;
  const lift=Math.max(45,Math.min(120,Math.abs(dx)*0.16));
  const cx=(start.x+end.x)/2, cy=(start.y+end.y)/2-lift;
  path.setAttribute('d',`M ${start.x} ${start.y} Q ${cx} ${cy} ${end.x} ${end.y}`);
  path.setAttribute('class','transfer-path');
  path.setAttribute('marker-end',`url(#${markerId})`);
  svg.appendChild(path);document.body.appendChild(svg);
  return {svg,path};
}
function pointOnQuad(start,end,t){
  const dx=end.x-start.x;
  const lift=Math.max(45,Math.min(120,Math.abs(dx)*0.16));
  const c={x:(start.x+end.x)/2,y:(start.y+end.y)/2-lift};
  const u=1-t;
  return {x:u*u*start.x+2*u*t*c.x+t*t*end.x,y:u*u*start.y+2*u*t*c.y+t*t*end.y};
}
function animateOne({from,to}){return new Promise(resolve=>{const si=findElectronInValence(from), ti=findFreeValenceSlot(to);if(si<0||ti<0){resolve();return}const sOrb=from.orbitals[si], tOrb=to.orbitals[ti];const sourceCount=from.counts[si], targetCount=to.counts[ti];const start=electronPosition(sOrb,sourceCount,'source'), end=electronPosition(tOrb,targetCount,'target');const arrow=createArrowPath(start,end);const f=document.createElement('div');f.className='flying-electron';const fs=start.size;f.style.width=fs+'px';f.style.height=fs+'px';f.style.left=(start.x-fs/2)+'px';f.style.top=(start.y-fs/2)+'px';document.body.appendChild(f);from.counts[si]--;renderOrbitalOnly(sOrb,from.counts[si]);updateAtomStats(from);const duration=2100;const hold=450;let t0=null;function step(ts){if(!t0)t0=ts;const elapsed=ts-t0;if(elapsed<hold){requestAnimationFrame(step);return}const p=Math.min(1,(elapsed-hold)/duration);const eased=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;const pos=pointOnQuad(start,end,eased);f.style.left=(pos.x-fs/2)+'px';f.style.top=(pos.y-fs/2)+'px';if(p<1){requestAnimationFrame(step)}else{to.counts[ti]++;renderOrbitalOnly(tOrb,to.counts[ti]);updateAtomStats(to);setTimeout(()=>{f.remove();arrow.svg.remove();resolve()},280)}}requestAnimationFrame(step)})}
function renderOrbitalOnly(orbital,count){orbital.innerHTML='';electronSlotsForOrbital(count).forEach(cls=>orbital.appendChild(renderElectron(cls)))}
document.getElementById('buildBtn').addEventListener('click',buildModels);document.getElementById('reactBtn').addEventListener('click',startReaction);document.getElementById('resetBtn').addEventListener('click',buildModels);metalSelect.addEventListener('change',buildModels);nonmetalSelect.addEventListener('change',buildModels);fillSelect(metalSelect,metals);fillSelect(nonmetalSelect,nonmetals);metalSelect.value='Na';nonmetalSelect.value='Cl';buildModels();
</script>
